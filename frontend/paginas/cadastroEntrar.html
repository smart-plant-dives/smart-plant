<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlant</title>
    <link rel="stylesheet" href="/css/cadastrarEntrar .css">

</head>
<header class="main-header">
 <a href="index.html"><img src="https://i.pinimg.com/736x/e7/35/8e/e7358e48ca6e2583c249b9c254bd88f1.jpg" alt="Smart Plant" class="logo-img"></a>
  <nav class="nav-auth">
    <a href="cadastroUsuario.html" class="btn-cadastrar"> CADASTRAR</a>
    <a href="entrarUsuario.html" class="btn-entrar"> ENTRAR</a>
  </nav>
</header>

<a href="cadastroUsuario.html" class="close-global-btn" title="Fechar">x</a>

<main class="login-container">
  <section class="login-box">
    <div class="login-form">
      <h2>Bem-vindo(a) ao SmartPlant</h2>
      <p>Crie sua conta</p>
      
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" placeholder="Email">
      </div>
      
      <div class="input-group">
        <label>Senha</label>
        <div class="password-input">
            <input type="password" placeholder="Senha" id="senha">
            <i class="fas fa-eye-slash" id="togglePassword"></i>
        </div>
      </div>
      
      
      <button class="btn-submit">Continuar</button>
    </div>


  </section>
</main>


<footer class="main-footer">
  <div class="footer-info">
    <span>📞 Contate-nos: (15) 92809-2649</span>
  </div>
  <div class="footer-copy">
    <span>🛡️ © Todos os Direitos Reservados</span>
  </div>
  <div class="footer-social">
    <span>🌐 Instagram Facebook</span>
  </div>
</footer>

<script src="/js/cadastroEntrar.js"></script>
</body>
</html>
