<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<header class="main-header">
 <a href="index.html"><img src="https://i.pinimg.com/736x/e7/35/8e/e7358e48ca6e2583c249b9c254bd88f1.jpg" alt="Smart Plant" class="logo-img"></a>
  <nav class="nav-auth">
    <a href="cadastroEntrar.html" class="btn-cadastrar"> CADASTRAR</a>
    <a href="entrarUsuario.html" class="btn-entrar"> ENTRAR</a>
  </nav>
</header>

<a href="cadastroUsuario.html" class="close-global-btn" title="Fechar">x</a>

<main class="login-container">
  <section class="login-box">
    <div class="login-form">
      <h2>Bem-vindo(a) ao SmartPlant</h2>
      <p>Crie uma nova senha</p>
      
      <div class="input-group">
        <label>Nova Senha</label>
         <div class="password-input">
        <input type="password" placeholder="Nova Senha">
        <i class="fas fa-eye-slash" id="togglePassword"></i>
        <ul class="password-rules">
    <li id="regraSenha" class="regra-invalida">
        <i class="far fa-circle icon-regra"></i> A senha não pode ser igual a antiga*.
        <i class="far fa-circle icon-regra"></i> Use 8 ou mais letras, números e símbolos.
    </li>
</ul>
         </div>
      </div>
      
      <div class="input-group">
        <label>Confirme a senha</label>
        <div class="password-input">
            <input type="password" placeholder="Senha" id="confirmarSenha">
            <i class="fas fa-eye-slash" id="togglePassword"></i>
        </div>
      </div>
      
      
      <button class="btn-submit">Salvar</button>
    </div>

    <div class="divider"></div>

  </section>
</main>


<footer class="main-footer">
