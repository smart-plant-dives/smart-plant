<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="/css/esqueciSenha.css">

</head>
<header class="main-header">
 <a href="index.html"><img src="https://i.pinimg.com/736x/e7/35/8e/e7358e48ca6e2583c249b9c254bd88f1.jpg" alt="Smart Plant" class="logo-img"></a>
  <nav class="nav-auth">
    <a href="cadastroEntrar.html" class="btn-cadastrar"> CADASTRAR</a>
    <a href="entrarUsuario.html" class="btn-entrar"> ENTRAR</a>
  </nav>
</header>

<a href="cadastroUsuario.html" class="close-global-btn" title="Fechar">x</a>

<main class="login-container">
  <section class="login-box">
    <div class="login-form">
      <h2>Bem-vindo(a) ao SmartPlant</h2>
      <p>Crie uma nova senha</p>
      
      <div class="input-group">
        <label>Nova Senha</label>
        <div class="password-inputs">
          <!-- Correção do type para "password" -->
          <input id="password" type="password" placeholder="Senha">
          <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
          
          <ul class="password-rules">
            <li id="regraSenha">
              <ul class="validacoes">
                <!-- Classes iniciais neutras/padronizadas -->
                <li id="validarAntiga" class="regra-item">A senha não pode ser igual à antiga</li>
                <li id="validarRequisitos" class="regra-item">Use 8 ou mais letras, números e símbolos</li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
      
      <div class="input-group">
        <label>Confirme a senha</label>
        <div class="password-input">
            <input type="password" placeholder="Senha" id="confirmarSenha">
            <i class="fas fa-eye-slash toggle-password" data-target="confirmarSenha"></i>
        </div>
      </div>
      
      <button class="btn-submit">Salvar</button>
    </div>

    <div class="divider"></div>

  </section>
</main>
