<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlant</title>
    <link rel="stylesheet" href="/css/cadastroUsuario.css">

</head>
<header class="main-header">
 <a href="index.html"><img src="https://i.pinimg.com/736x/e7/35/8e/e7358e48ca6e2583c249b9c254bd88f1.jpg" alt="Smart Plant" class="logo-img"></a>
  <nav class="nav-auth">
    <a href="cadastroEntrar.html" class="btn-cadastrar"> CADASTRAR</a>
 
  </nav>
</header>

<a href="/index.html" class="close-global-btn" title="Ínicio">x</a>

<main class="login-container">
  <section class="login-box">
    <div class="login-form">
      <h2>Bem-vindo(a) ao SmartPlant</h2>
      <p>Acesse sua conta e continue cuidando das suas plantas.</p>
      
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" placeholder="Email">
      </div>
      
      <div class="input-group">
        <label>Senha</label>
        <div class="password-input">
            <input type="password" placeholder="Senha" id="senha">
            <i class="fas fa-eye-slash" id="togglePassword"></i>
        </div>
      </div>
      
      <a href="esqueciSenha.html" class="forgot-password">Esqueceu a senha?</a>
      <button class="btn-submit">Entrar</button>
    </div>

    

    <div class="register-promo">
      <h3>Ainda não possui conta?</h3>
      <p>Crie sua conta e comece a cuidar ainda melhor das suas plantas.</p>
      <a href="cadastroEntrar.html" class="btn-outline">Criar conta</a>
    </div>
  </section>
</main>

    </div>

    <div class="copyright">

    <div class="social">
        <img src="https://cdn.imgbin.com/1/15/4/imgbin-logo-whatsapp-computer-icons-viber-call-icon-rUC3mkCwdZBU8fCG71krgSdfd.jpg" height="20">
        <img src="https://image.similarpng.com/file/similarpng/very-thumbnail/2020/05/Icon-Instagram-PNG.png" height="20">
        <img src="https://www.citypng.com/public/uploads/preview/outline-round-facebook-fb-icon-logo-701751695134773jn1popsjn6.png" height="20">
    </div>

</footer>

<script src="/js/cadastroUsuario.js"></script>
</body>
</html>
