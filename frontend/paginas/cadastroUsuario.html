<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Pagina de Cadastro de usuario</title>
</head>
<body>
    <!-- SEÇÃO HERO -->
    <header class="bg-primary">
        <div class="container">
            <h1 class="marca">
                SmartPlant
            </h1>
            <a href="#" class="btn btn-light btn-lg"></a>
        </div>
    </header>
      </div>
    </div>
</section>

<section class="container py-5">
    <div class="row justify-content-center">
         <div class="col-md-8 ">
         <h3 class="text-center mb-4">Cadastro</h3>
<div class="mb-3">
  <label for="exampleFormControlInput1" class="form-label">Nome:</label>
  <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Digite seu nome aqui">
</div>
<div class="mb-3">
  <label for="exampleFormControlInput1" class="form-label">E-mail</label>
  <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Digite seu e-mail aqui ex.: nome@example.com">
</div>
<div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label">Mensagem:</label>
  <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="Digite uma mensagem aqui"></textarea>
</div>
<div class="d-grid">
 <button type="submit" class="btn btn-primary">Enviar Mensagem</button>
 </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">

        <p class="md-1">&copy; 2026 SmartPlant. Todos os direitos reservados.</p>

            <a href="#" class="text-white text-decoration-none me-3">Política de privacidade</a>
            <a href="#" class="text-center text-decoration-none">Termos de uso</a>
        </small>


    </div>
</footer>
