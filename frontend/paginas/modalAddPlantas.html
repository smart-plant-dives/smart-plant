<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Plant - Modal</title>
    <link rel="stylesheet" href="/css/modalEditarPlanta.css">
</head>
<body>

    <div class="card-adicionar-post" id="btnAbrirModal">
        <span class="mais">+</span>
        <p>Adicionar nova planta</p>
    </div>

    <div id="modalPostagem" class="modal-overlay">
        <div class="modal-container-post">
            <h2 class="titulo-modal" id="modalTitulo">Adicionar Planta</h2>

            <div class="upload-area" id="dropzone">
                <input type="file" id="inputFoto" accept="image/*" hidden>
                <div id="uploadPlaceholder">
                    <span class="nuvem-icon">☁︎<sup>+</sup></span>
                    <p>Adicionar imagem<br>da planta</p>
                </div>
                <img src="" id="imgPreview" class="hidden">
            </div>

            <div class="post-form">
                <input type="text" id="nomePlanta" placeholder="Nome da planta">

                <div class="custom-select" id="selectEspecie">
                    <div class="select-header">
                        <span class="label">Selecionar espécie</span>
                        <span class="seta">❯</span>
                    </div>
                    <div class="select-options hidden">
                        <div id="resEspecies"></div>
                    </div>
                </div>

                <div class="custom-select" id="selectCategoria">
                    <div class="select-header">
                        <span class="label">Selecionar categoria</span>
                        <span class="seta">❯</span>
                    </div>
                    <div class="select-options hidden" id="resCategorias"></div>
                </div>

                <textarea id="descricao" placeholder="Sua experiência:" rows="3"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" id="btnPrivacidade" class="btn-pvt">
                    <span id="pvtIcon">🌐</span> <span id="pvtText">Público</span>
                </button>
                <button type="button" id="btnSalvar" class="btn-save">Salvar</button>
            </div>
        </div>
    </div>

    <script src="/js/modalEditarPlanta.js"></script>
</body>
</html>
