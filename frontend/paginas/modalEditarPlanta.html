<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Plant - Sistema de Edição</title>
    <link rel="stylesheet" href="/css/modalEditarPlanta.css">
</head>
<body>

    <div style="padding: 20px;">
        <div class="card-adicionar-post" id="btnAbrirModal" style="cursor:pointer; border: 2px dashed #ccc; width: 200px; padding: 20px; text-align: center; border-radius: 15px;">
            <span style="font-size: 24px;">+</span>
            <p>Adicionar nova planta</p>
        </div>
    </div>

    <div id="modalPostagem" class="modal-overlay">
        <div class="modal-container-post">
            <h2 class="titulo-modal" id="modalTitulo">Editar Planta</h2>

            <div class="upload-area" id="dropzone">
                <input type="file" id="inputFoto" accept="image/*" hidden>
                <div id="uploadPlaceholder">
                    <span class="nuvem-icon">☁︎<sup>+</sup></span>
                    <p>Adicionar imagem<br>da planta</p>
                </div>
                <img src="" id="imgPreview" class="hidden">
            </div>

            <div class="post-form">
                <input type="text" id="nomePlanta" placeholder="Nome da planta">

                <div class="custom-select" id="selectEspecie">
                    <div class="select-header">
                        <span class="label">Selecionar espécie</span>
                        <span class="seta">❯</span>
                    </div>
                    <div class="select-options hidden">
                        <input type="text" class="api-search" placeholder="Buscar espécie científica...">
                        <div id="resEspecies">
                            <p class="aviso">Digite 3 letras para buscar...</p>
                        </div>
                    </div>
                </div>

                <div class="custom-select" id="selectCategoria">
                    <div class="select-header">
                        <span class="label">Selecionar categoria</span>
                        <span class="seta">❯</span>
                    </div>
                    <div class="select-options hidden" id="resCategorias"></div>
                </div>

                <div class="custom-select" id="selectPrivacidade">
                    <div class="select-header">
                        <div style="display: flex; align-items: center;">
                            <span id="pvtIcon" class="icon-preto">🌐</span>
                            <span id="pvtText" class="label" style="margin-left: 10px;">Público</span>
                        </div>
                        <span class="seta" style="transform: rotate(90deg);">❯</span>
                    </div>
                    <div class="select-options hidden">
                        <div class="option-item" onclick="setPrivacidade(true, '🌐', 'Público')">
                            <span class="icon-preto">🌐</span> Público
                        </div>
                        <div class="option-item" onclick="setPrivacidade(false, '🔒', 'Privado')">
                            <span class="icon-preto">🔒</span> Privado
                        </div>
                    </div>
                </div>

                <textarea id="descricao" placeholder="Sua experiência:" rows="3"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" id="btnSalvar" class="btn-save">Salvar alterações</button>
            </div>
        </div>
    </div>

    <script src="/js/modalEditarPlanta.js"></script>
</body>
</html>
