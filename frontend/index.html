<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SmartPlant - Cadastro</title>
  <link rel="stylesheet" href="css/cadastroUsuario.css">
</head>
<body>

  <!-- HEADER -->
  <header class="topo">
    <div class="logo-area">
      <img src="img/logo.png" class="logo">
      <h1 style="font-family:Georgia, 'Times New Roman', Times, serif ;">SmartPlant</h1>
    </div>

    <div class="topo-botoes">
      <button class="icon-btnn">
      </button>

      <button class="icon-btn">
      </button>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main>
    <h2 class="titulo">CADASTRO</h2>

    <div class="card">
      
      <!-- USUÁRIO -->
      <div class="linha">
        <img src="https://cdn-icons-png.flaticon.com/512/5582/5582872.png" class="icone">
        <div class="campo">
          <label>Nome do usuário:</label>
          <input type="text">
        </div>
      </div>

      <hr>

      <!-- EMAIL -->
      <div class="linha">
        <img src="img/email.png" class="icone">
        <div class="campo">
          <label>Email.com:</label>
          <input type="email" placeholder="exemplo@gmail.com">
        </div>
      </div>

      <hr>

      <!-- SENHA -->
      <div class="linha">
        <img src="img/cadeado.png" class="icone">
        <div class="campo">
          <label>Senha do usuário:</label>
          <input type="password">
        </div>
      </div>

    </div>

    <!-- BOTÃO -->
    <button class="btn-salvar">
      SALVAR INFORMAÇÕES DE LOGIN
    </button>

  </main>

  <!-- FOOTER -->
  <footer class="rodape">
    <p>Contate-nos (15) 92809-2649</p>
    <p>© Todos os direitos reservados a SmartPlant</p>

    <div class="redes">
      <img src="img/whatsapp.png">
      <img src="img/instagram.png">
      <img src="img/facebook.png">
    </div>
  </footer>

</body>
</html>
