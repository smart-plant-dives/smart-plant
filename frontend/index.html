    <h1>SmartPlant: Cuidado inteligente para suas plantas</h1>
    <hr>

    <p>
      A SmartPlant é uma empresa que visa o cuidado e segurança da natureza,
      com um sistema que monitora a umidade do solo em tempo real por meio de
      um sensor IoT conectado ao aplicativo.
    </p>

    <p>
      Temos como objetivo auxiliar com os problemas recorrentes de cuidados com
      as plantas; erros simples de rega e o excesso ou falta de água que
      prejudica a vida das nossas plantinhas.
    </p>

    <p>
      Além de nosso aplicativo oferecer um guia completo com descrições
      necessárias como: orientações sobre luz, nutrientes e frequência de rega.
    </p>

    <p>
      Ao adquirir nosso trabalho, nosso usuário ganhará conforto e controle
      total de cuidados ao vivo, não precisando passar por mais frustrações ao
      possuir plantas domésticas.
    </p>
